<div class="toast-stack pointer-events-none fixed top-20 right-4 z-[1000] flex w-[min(90vw,24rem)] flex-col gap-3">
    <div *ngFor="let toast of toastService.toasts$ | async"
        class="pointer-events-auto rounded-xl border px-4 py-3 shadow-lg backdrop-blur-sm" [ngClass]="{
            'border-emerald-200 bg-emerald-50/95 text-emerald-900': toast.type === 'success',
            'border-red-200 bg-red-50/95 text-red-900': toast.type === 'error',
            'border-blue-200 bg-blue-50/95 text-blue-900': toast.type === 'info'
        }">
        <div class="flex items-start justify-between gap-3">
            <p class="text-sm font-semibold font-cairo">{{ toast.message }}</p>
            <button type="button" (click)="dismiss(toast.id)" class="rounded p-0.5 text-current/70 hover:text-current"
                aria-label="Dismiss notification">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>
</div>
