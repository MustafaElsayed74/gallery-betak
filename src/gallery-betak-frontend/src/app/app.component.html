<div class="flex flex-col min-h-screen">
  <app-navbar></app-navbar>

  <section *ngIf="isSessionBannerVisible"
    class="session-banner border-b border-amber-200/90 bg-gradient-to-r from-amber-50/95 via-white/95 to-orange-50/90 px-4 py-3">
    <div class="mx-auto flex max-w-7xl items-start justify-between gap-3 sm:items-center sm:px-2">
      <div class="space-y-0.5">
        <p class="font-cairo text-sm font-black text-amber-900">{{ uiMessages.session.expiredTitle }}</p>
        <p class="font-cairo text-xs text-amber-800 sm:text-sm">{{ uiMessages.session.expiredMessage }}</p>
      </div>
      <button type="button"
        class="shrink-0 rounded-lg border border-amber-300 bg-white/90 px-3 py-1.5 text-xs font-bold text-amber-900 hover:bg-amber-100 focus:outline-none focus:ring-2 focus:ring-amber-300"
        (click)="dismissSessionBanner()">
        {{ uiMessages.session.dismiss }}
      </button>
    </div>
  </section>

  <app-toast-container></app-toast-container>

  <main class="flex-grow app-main">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
